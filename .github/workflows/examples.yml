name: examples

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a non-shallow checkout so the auto-commit (on main) can
          # see the existing branch history.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Regenerate examples
        run: uv run python scripts/generate_examples.py

      - name: Verify examples render
        run: |
          test -s examples/cja-typical.html
          test -s examples/aa-typical.html
          head -1 examples/cja-typical.html | grep -qi '^<!doctype html>'
          head -1 examples/aa-typical.html | grep -qi '^<!doctype html>'

      - name: Commit refreshed examples on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet examples/; then
            echo "examples/ unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/
          git commit -m "ci: refresh examples [skip ci]"
          git push
