name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write   # required for PyPI trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Upload distributions to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted-publisher relationship must be configured on PyPI for the
        # repo before this step succeeds. Until then, the GitHub release
        # artifacts are still produced by the previous step, and this step
        # will fail loudly.
