name: version-sync

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify pyproject, __init__, and uv.lock agree
        run: |
          python3 - <<'EOF'
          import re, sys, tomllib

          def fail(msg):
              print(f"version-sync: {msg}")
              sys.exit(1)

          try:
              py = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          except (OSError, KeyError, tomllib.TOMLDecodeError):
              fail("could not read [project].version from pyproject.toml")

          m = re.search(
              r'__version__ = "([^"]+)"',
              open("src/sdr_visualizer/__init__.py").read(),
          )
          if not m:
              fail("could not locate __version__ in src/sdr_visualizer/__init__.py — update the pattern in .github/workflows/version-sync.yml")
          init = m.group(1)

          m = re.search(
              r'name = "sdr-visualizer"\nversion = "([^"]+)"',
              open("uv.lock").read(),
          )
          if not m:
              fail("could not locate sdr-visualizer's version in uv.lock — update the pattern in .github/workflows/version-sync.yml")
          lock = m.group(1)

          print(f"pyproject={py} __init__={init} uv.lock={lock}")
          if not (py == init == lock):
              fail(f"version drift: pyproject={py} __init__={init} uv.lock={lock}")
          print("versions in sync")
          EOF
